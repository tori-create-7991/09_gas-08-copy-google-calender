name: Deploy to Google Apps Script

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Create .clasprc.json
        run: |
          echo '${{ secrets.CLASPRC_JSON }}' > ~/.clasprc.json

      - name: Create .clasp.json
        run: |
          echo '{
            "scriptId": "${{ secrets.SCRIPT_ID }}",
            "rootDir": "src"
          }' > .clasp.json

      - name: Inject calendar sync pairs from secret
        if: ${{ env.SYNC_PAIRS_JSON != '' }}
        run: |
          node -e '
            var fs = require("fs");
            var pairs = JSON.parse(process.env.SYNC_PAIRS_JSON);
            var config = fs.readFileSync("src/Config.gs", "utf8");
            var I = "    ";
            var I2 = "      ";
            var I3 = "        ";
            function formatDest(d) {
              var lines = [I2 + "{"];
              lines.push(I3 + "calendarId: " + JSON.stringify(d.calendarId) + ",");
              if (d.eventTitle != null) lines.push(I3 + "eventTitle: " + JSON.stringify(d.eventTitle) + ",");
              if (d.eventColor != null) lines.push(I3 + "eventColor: " + d.eventColor + ",");
              if (d.showAsBusy != null) lines.push(I3 + "showAsBusy: " + d.showAsBusy + ",");
              if (d.includeOriginalLink != null) lines.push(I3 + "includeOriginalLink: " + d.includeOriginalLink + ",");
              if (d.inviteCopy != null) lines.push(I3 + "inviteCopy: " + JSON.stringify(d.inviteCopy, null, 2).split(\"\\n\").map(function(l){return I3 + l;}).join(\"\\n\").slice(I3.length) + ",");
              lines.push(I2 + "}");
              return lines.join("\n");
            }
            var pairsCode = pairs.map(function(p) {
              var dests = p.destinations;
              if (!dests) {
                var ids = p.destCalendarIds || (p.destCalendarId ? [p.destCalendarId] : []);
                dests = ids.map(function(id) {
                  var d = { calendarId: id };
                  if (p.eventTitle != null) d.eventTitle = p.eventTitle;
                  if (p.eventColor != null) d.eventColor = p.eventColor;
                  return d;
                });
              }
              var lines = [I + "{"];
              lines.push(I + "  name: " + JSON.stringify(p.name) + ",");
              lines.push(I + "  sourceCalendarId: " + JSON.stringify(p.sourceCalendarId) + ",");
              if (p.eventTitle != null) lines.push(I + "  eventTitle: " + JSON.stringify(p.eventTitle) + ",");
              if (p.eventColor != null) lines.push(I + "  eventColor: " + p.eventColor + ",");
              lines.push(I + "  destinations: [");
              lines.push(dests.map(formatDest).join(",\n"));
              lines.push(I + "  ],");
              lines.push(I + "}");
              return lines.join("\n");
            }).join(",\n");
            var replacement =
              "// --- SYNC_PAIRS_START ---\n" +
              "function getSyncPairsRaw() {\n" +
              "  return [\n" +
              pairsCode + "\n" +
              "  ];\n" +
              "}\n" +
              "// --- SYNC_PAIRS_END ---";
            config = config.replace(
              /\/\/ --- SYNC_PAIRS_START ---[\s\S]*?\/\/ --- SYNC_PAIRS_END ---/,
              replacement
            );
            fs.writeFileSync("src/Config.gs", config);
            console.log("Injected " + pairs.length + " sync pair(s) from SYNC_PAIRS_JSON");
          '
        env:
          SYNC_PAIRS_JSON: ${{ secrets.SYNC_PAIRS_JSON }}

      - name: Inject invite routing config from secret
        if: ${{ env.INVITE_ROUTING_JSON != '' }}
        run: |
          node -e '
            var fs = require("fs");
            var cfg = JSON.parse(process.env.INVITE_ROUTING_JSON);
            var configGs = fs.readFileSync("src/Config.gs", "utf8");
            var replacement =
              "// --- INVITE_ROUTING_START ---\n" +
              "function getInviteRoutingConfig() {\n" +
              "  return " + JSON.stringify(cfg, null, 2) + ";\n" +
              "}\n" +
              "// --- INVITE_ROUTING_END ---";
            configGs = configGs.replace(
              /\/\/ --- INVITE_ROUTING_START ---[\s\S]*?\/\/ --- INVITE_ROUTING_END ---/,
              replacement
            );
            fs.writeFileSync("src/Config.gs", configGs);
            console.log("Injected invite routing config from INVITE_ROUTING_JSON");
          '
        env:
          INVITE_ROUTING_JSON: ${{ secrets.INVITE_ROUTING_JSON }}

      - name: Inject invite copy config from secret
        if: ${{ env.INVITE_COPY_JSON != '' }}
        run: |
          node -e '
            var fs = require("fs");
            var cfg = JSON.parse(process.env.INVITE_COPY_JSON);
            var configGs = fs.readFileSync("src/Config.gs", "utf8");
            var replacement =
              "// --- INVITE_COPY_START ---\n" +
              "function getInviteCopyConfig() {\n" +
              "  return " + JSON.stringify(cfg, null, 2) + ";\n" +
              "}\n" +
              "// --- INVITE_COPY_END ---";
            configGs = configGs.replace(
              /\/\/ --- INVITE_COPY_START ---[\s\S]*?\/\/ --- INVITE_COPY_END ---/,
              replacement
            );
            fs.writeFileSync("src/Config.gs", configGs);
            console.log("Injected invite copy config from INVITE_COPY_JSON");
          '
        env:
          INVITE_COPY_JSON: ${{ secrets.INVITE_COPY_JSON }}

      - name: Push to Google Apps Script
        run: clasp push --force

      # 注: 組織のGoogle Workspaceではデプロイ権限が制限されている場合があります
      # その場合はGASエディタから手動でデプロイしてください
      # - name: Deploy
      #   run: clasp deploy --description "Auto deploy from GitHub Actions"
