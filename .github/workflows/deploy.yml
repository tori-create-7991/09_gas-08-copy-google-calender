name: Deploy to Google Apps Script

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Create .clasprc.json
        run: |
          echo '${{ secrets.CLASPRC_JSON }}' > ~/.clasprc.json

      - name: Create .clasp.json
        run: |
          echo '{
            "scriptId": "${{ secrets.SCRIPT_ID }}",
            "rootDir": "src"
          }' > .clasp.json

      - name: Inject calendar sync pairs from secret
        if: ${{ env.SYNC_PAIRS_JSON != '' }}
        run: |
          node -e '
            var fs = require("fs");
            var pairs = JSON.parse(process.env.SYNC_PAIRS_JSON);
            var config = fs.readFileSync("src/Config.gs", "utf8");
            var indent = "    ";
            var pairsCode = pairs.map(function(p) {
              var destIds = p.destCalendarIds || (p.destCalendarId ? [p.destCalendarId] : []);
              var lines = [
                indent + "{",
                indent + "  name: " + JSON.stringify(p.name) + ",",
                indent + "  sourceCalendarId: " + JSON.stringify(p.sourceCalendarId) + ",",
                indent + "  destCalendarIds: " + JSON.stringify(destIds) + ","
              ];
              if (p.eventTitle != null) {
                lines.push(indent + "  eventTitle: " + JSON.stringify(p.eventTitle) + ",");
              }
              if (p.eventColor != null) {
                lines.push(indent + "  eventColor: " + p.eventColor + ",");
              }
              lines.push(indent + "}");
              return lines.join("\n");
            }).join(",\n");
            var replacement =
              "// --- SYNC_PAIRS_START ---\n" +
              "function getSyncPairsRaw() {\n" +
              "  return [\n" +
              pairsCode + "\n" +
              "  ];\n" +
              "}\n" +
              "// --- SYNC_PAIRS_END ---";
            config = config.replace(
              /\/\/ --- SYNC_PAIRS_START ---[\s\S]*?\/\/ --- SYNC_PAIRS_END ---/,
              replacement
            );
            fs.writeFileSync("src/Config.gs", config);
            console.log("Injected " + pairs.length + " sync pair(s) from SYNC_PAIRS_JSON");
          '
        env:
          SYNC_PAIRS_JSON: ${{ secrets.SYNC_PAIRS_JSON }}

      - name: Push to Google Apps Script
        run: clasp push --force

      # 注: 組織のGoogle Workspaceではデプロイ権限が制限されている場合があります
      # その場合はGASエディタから手動でデプロイしてください
      # - name: Deploy
      #   run: clasp deploy --description "Auto deploy from GitHub Actions"
