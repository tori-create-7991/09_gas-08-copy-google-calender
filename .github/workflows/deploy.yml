name: Deploy to Google Apps Script

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Create .clasprc.json
        run: |
          echo '${{ secrets.CLASPRC_JSON }}' > ~/.clasprc.json

      - name: Create .clasp.json
        run: |
          echo '{
            "scriptId": "${{ secrets.SCRIPT_ID }}",
            "rootDir": "src"
          }' > .clasp.json

      - name: Inject calendar sync pairs from secret
        if: ${{ env.SYNC_PAIRS_JSON != '' }}
        run: node scripts/inject-sync-pairs.js
        env:
          SYNC_PAIRS_JSON: ${{ secrets.SYNC_PAIRS_JSON }}

      - name: Inject invite routing config from secret
        if: ${{ env.INVITE_ROUTING_JSON != '' }}
        run: node scripts/inject-invite-routing.js
        env:
          INVITE_ROUTING_JSON: ${{ secrets.INVITE_ROUTING_JSON }}

      - name: Push to Google Apps Script
        run: clasp push --force

      # 注: 組織のGoogle Workspaceではデプロイ権限が制限されている場合があります
      # その場合はGASエディタから手動でデプロイしてください
      # - name: Deploy
      #   run: clasp deploy --description "Auto deploy from GitHub Actions"
